name: SmartManager CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '18'
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  # Tests et validation
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: smartmanager_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint

      - name: Run type checking
        run: npm run type-check

      - name: Setup database
        run: |
          npx prisma migrate deploy
          npx prisma generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/smartmanager_test

      - name: Run unit tests
        run: npm run test:unit

      - name: Run E2E tests
        run: |
          npm run build
          npm run test:e2e
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/smartmanager_test
          NEXTAUTH_SECRET: test-secret
          JWT_SECRET: test-jwt-secret

      - name: Security audit
        run: npm audit --audit-level moderate

  # Build et optimisation
  build:
    needs: test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --production=false

      - name: Build application
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_TELEMETRY_DISABLED: 1

      - name: Analyze bundle size
        run: npm run analyze

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: .next/
          retention-days: 1

  # Déploiement staging
  deploy-staging:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build

      - name: Deploy to staging
        run: |
          echo "Deploying to staging environment..."
          # Script de déploiement ici
          # rsync, docker, ou autre méthode

      - name: Run smoke tests
        run: |
          npm run test:smoke
        env:
          BASE_URL: https://staging.smartmanager.com

  # Déploiement production
  deploy-production:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build

      - name: Deploy to production
        run: |
          echo "Deploying to production..."
          # Script de déploiement ici
          # Avec rollback automatique en cas d'échec

      - name: Health check
        run: |
          curl -f https://smartmanager.com/api/health || exit 1

      - name: Run production tests
        run: |
          npm run test:production
        env:
          BASE_URL: https://smartmanager.com

      - name: Notify deployment
        if: success()
        run: |
          echo "Deployment successful!"
          # Notification Slack, email, etc.

  # Performance monitoring
  performance:
    needs: deploy-production
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Run Lighthouse CI
        run: |
          npm install -g @lhci/cli@0.12.x
          lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Load testing
        run: |
          npm run test:load
        env:
          BASE_URL: https://smartmanager.com

  # Backup et monitoring
  post-deploy:
    needs: [deploy-production, performance]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Create database backup
        run: |
          echo "Creating backup..."
          # Script de backup

      - name: Update monitoring dashboards
        run: |
          echo "Updating dashboards..."
          # Mise à jour Grafana, etc.

      - name: Cleanup old artifacts
        run: |
          echo "Cleaning up..."
          # Nettoyage des anciennes versions
